# SERVER CONFIGURATION
server.port=8082
app.base-url=http://localhost:8082
app.frontend.url=http://localhost:4200

# DATABASE CONFIGURATION (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/minio_app?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=appuser
spring.datasource.password=appuser123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# SECURITY CONFIGURATION (JWT)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# MAIL SERVICE CONFIGURATION (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# MINIO STORAGE CONFIGURATION
minio.endpoint=http://localhost:9000
minio.accessKey=minioadmin
minio.secretKey=minioadmin123

# BUCKET LIMITS
app.bucket.max-buckets-per-user=10
app.bucket.default-quota-bytes=10737418240

# FILE UPLOAD LIMITS
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
app.storage.max-file-size=104857600

# DOCUMENTATION AND MONITORING (Swagger & Tasks)
springdoc.swagger-ui.operationsSorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.task.scheduling.enabled=true

# LOGGING LEVELS
logging.level.com.minio=DEBUG
logging.level.org.hibernate.SQL=DEBUG

#STATS
app.stats.max-users=1000
app.stats.max-buckets=1000

#VERSION
spring.application.version=1.0.0

#SHARE LINK
app.share-link.presigned-url-ttl-seconds=300